version: '3.8'

services:
  db:
    image: postgres:16
    container_name: marketx-postgres
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: marketx_db
    ports:
      - "5432:5432"

  cache:
    image: redis:7
    container_name: marketx-redis
    restart: always
    ports:
      - "6379:6379"