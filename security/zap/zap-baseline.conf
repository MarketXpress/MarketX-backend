###############################################################################
# OWASP ZAP Security Testing Configuration - MarketX Backend
# Automated DAST (Dynamic Application Security Testing) Configuration
###############################################################################

# ZAP API Configuration
api.key = zap_api_key_change_in_production
server.address = zap
server.port = 8080

# Context Configuration for MarketX
context.name = MarketX_Backend
context.url = http://api:3000

# Authentication Configuration
authentication.method = formBased
authentication.recursive = true

# Spider Configuration
spider.maxDuration = 10
spider.maxDepth = 10
spider.threadCount = 10
spider.maxChildren = 100

# Active Scan Configuration
ascan.maxDuration = 60
ascan.maxRuleTimeMin = 5
ascan.threadCount = 20
ascan.maxScanTimeInMins = 30

# Enable All Active Scan Rules
# SQL Injection - Primary Focus
scanner.policy.sql_injection = HIGH
scanner.strength.sql_injection = INSANE
scanner.attackOnStart = true

# CSRF/XSRF Detection
scanner.policy.csrf = MEDIUM
scanner.strength.csrf = AGGRESSIVE

# Additional Security Checks
scanner.policy.xss = HIGH
scanner.policy.path_traversal = HIGH
scanner.policy.ssrf = HIGH
scanner.policy.ssti = HIGH
scanner.policy.command_injection = HIGH
scanner.policy.xpath_injection = HIGH
scanner.policy.ldap_injection = HIGH
scanner.policy.xxe = HIGH
scanner.policy.json_tainting = HIGH
scanner.policy.sOap_tainting = HIGH

# Informational and Low Risk
scanner.policy.info_leak = LOW
scanner.policy.missing_csrf_tokens = MEDIUM
scanner.policy.session_id_in_url = LOW
scanner.policy.weak_auth = MEDIUM

# Alert Threshold Configuration
alert.threshold.high = PASS
alert.threshold.medium = WARN
alert.threshold.low = WARN
alert.threshold.info = WARN

# Proxy Configuration
proxy.port = 8090
proxy.host = zap_proxy

# Report Configuration
report.output.format = json,html,xml
report.output.filename = marketx_security_report_{datetime}
report.layout = traditional

# Custom Payloads Configuration
custom.payload.file.sql_injection = /zap/payloads/sql-injection.txt
custom.payload.file.csrf = /zap/payloads/csrf.txt

# Scan Policy - SQL Injection Heavy
scanPolicy.name = SQL_Injection_Heavy
scanPolicy.attackStrength = INSANE
scanPolicy.alertThreshold = LOW

# Scan Policy - CSRF/XSRF
scanPolicy.name = CSRF_XSRF_Testing
scanPolicy.attackStrength = AGGRESSIVE
scanPolicy.alertThreshold = MEDIUM

# Request Headers
re_scan.headers = true
re_scan.cookies = true

# Form Handling
forms.detect = true
forms.mode = AUTO

# Technology Detection
tech.detect = PostgreSQL
tech.detect = Redis
tech.detect = RabbitMQ
tech.detect = Node.js

# Network Configuration
network.connectionTimeout = 30
network.readTimeout = 60
network.retries = 3

# Debug Configuration
debug.enabled = true
debug.path = /zap/reports/debug.log
