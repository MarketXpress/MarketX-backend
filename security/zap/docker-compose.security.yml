###############################################################################
# OWASP ZAP Security Testing Docker Compose - MarketX Backend
# Standalone security testing configuration for penetration testing
###############################################################################

version: '3.9'

services:
  # ── OWASP ZAP Scanner ──────────────────────────────────────────
  zap:
    image: owasp/zap2docker-stable:latest
    container_name: marketx_zap_scanner
    restart: "no"
    command: zap-baseline.sh \
      -t "http://api:3000/" \
      -J "zap_report.json" \
      -l INFORMATION \
      -config api.key=zap_api_key_change_in_production \
      -config scanner.attackOnStart=true \
      -config ascan.attackStrength=INSANE \
      -config ascan.alertThreshold=LOW \
      -config spider.maxDuration=10 \
      -config ascan.maxDuration=60
    volumes:
      - ./security/zap/payloads:/zap/payloads:ro
      - ./security/zap/reports:/zap/wrk:rw
      - ./security/zap/zap-baseline.conf:/zap/conf/zap-baseline.conf:ro
      - ./security/zap/scripts/run-security-tests.sh:/zap/scripts/run-security-tests.sh:ro
    environment:
      ZAP_API_KEY: zap_api_key_change_in_production
      ZAP_HOST: zap
      ZAP_PORT: 8080
      API_HOST: api
      API_PORT: 3000
      JAVA_OPTS: "-Xmx2048m"
    depends_on:
      - api
    networks:
      - marketx_net
    profiles:
      - security-test

  # ── OWASP ZAP Full Scan ─────────────────────────────────────────
  zap-full:
    image: owasp/zap2docker-stable:latest
    container_name: marketx_zap_full_scanner
    restart: "no"
    command: zap-full-scan.py \
      -t "http://api:3000/" \
      -J "zap_full_report.json" \
      -html "zap_full_report.html" \
      -l INFORMATION \
      -T 60
    volumes:
      - ./security/zap/payloads:/zap/payloads:ro
      - ./security/zap/reports:/zap/wrk:rw
    depends_on:
      - api
    networks:
      - marketx_net
    profiles:
      - security-test

  # ── OWASP ZAP API Scan ──────────────────────────────────────────
  zap-api:
    image: owasp/zap2docker-stable:latest
    container_name: marketx_zap_api_scanner
    restart: "no"
    command: zap-api-scan.py \
      -f openapi \
      -t "http://api:3000/api-docs" \
      -J "zap_api_report.json" \
      -html "zap_api_report.html"
    volumes:
      - ./security/zap/payloads:/zap/payloads:ro
      - ./security/zap/reports:/zap/wrk:rw
    depends_on:
      - api
    networks:
      - marketx_net
    profiles:
      - security-test

  # ── Security Test Runner ────────────────────────────────────────
  security-test-runner:
    image: owasp/zap2docker-stable:latest
    container_name: marketx_security_runner
    restart: "no"
    command: /bin/bash /zap/scripts/run-security-tests.sh
    volumes:
      - ./security/zap/payloads:/zap/payloads:ro
      - ./security/zap/reports:/zap/reports:rw
      - ./security/zap/zap-baseline.conf:/zap/conf/zap-baseline.conf:ro
      - ./security/zap/scripts:/zap/scripts:ro
    environment:
      ZAP_API_KEY: zap_api_key_change_in_production
      ZAP_HOST: zap
      ZAP_PORT: 8080
      API_HOST: api
      API_PORT: 3000
    depends_on:
      api:
        condition: service_healthy
      zap:
        condition: service_started
    networks:
      - marketx_net
    profiles:
      - security-test

  # ── Report Aggregator ───────────────────────────────────────────
  security-report:
    image: alpine:latest
    container_name: marketx_security_report
    restart: "no"
    command: >
      sh -c "echo 'Waiting for reports...' &&
             sleep 30 &&
             ls -la /reports/ &&
             echo 'Report aggregation complete'"
    volumes:
      - ./security/zap/reports:/reports:rw
    depends_on:
      - zap
    networks:
      - marketx_net
    profiles:
      - security-test

# ── Network ────────────────────────────────────────────────────────
networks:
  marketx_net:
    external: true
