name: CI Pipeline

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  ci:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test -- --passWithNoTests --forceExit
        env:
          NODE_ENV: test
          DATABASE_USER: test_user
          DATABASE_PASSWORD: test_password
          DATABASE_NAME: test_db
          JWT_SECRET: test-jwt-secret-key-for-ci-testing-only
          JWT_ACCESS_SECRET: test-jwt-access-secret-key-for-ci-testing-only
          JWT_REFRESH_SECRET: test-jwt-refresh-secret-key-for-ci-testing-only
