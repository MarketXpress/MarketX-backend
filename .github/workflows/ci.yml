name: CI Pipeline

on:
  workflow_dispatch:

jobs:
  ci:
    name: Issue Slice Verification
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Run issue-slice tests
        run: npm run test:issues

      - name: Smoke-check worker and messaging files
        run: |
          test -f src/media/media.processor.ts
          test -f src/recommendation/recommendation.processor.ts
          test -f src/messaging/rabbitmq.service.ts
