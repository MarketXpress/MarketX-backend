name: Coverage Gate

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'src/auth/**'
      - 'src/users/**'
      - 'src/products/**'
      - 'src/orders/**'
      - 'src/categories/**'
      - 'src/health/**'
      - 'package.json'
  push:
    branches: [main, develop]
    paths:
      - 'src/auth/**'
      - 'src/users/**'
      - 'src/products/**'
      - 'src/orders/**'
      - 'src/categories/**'
      - 'src/health/**'
      - 'package.json'
  workflow_dispatch:

jobs:
  coverage-check:
    name: Core Domain Coverage Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:cov -- --passWithNoTests --forceExit

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7
