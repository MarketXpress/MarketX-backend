name: Pact Contract Verification

on:
  workflow_dispatch:

env:
  NODE_ENV: test
  CI: true

jobs:
  verify-contracts:
    name: Verify Provider Contracts
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: marketx_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Setup test database
        env:
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_USER: test
          DATABASE_PASSWORD: test
          DATABASE_NAME: marketx_test
        run: |
          echo "Database ready for testing"

      - name: Start application in background
        env:
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_USER: test
          DATABASE_PASSWORD: test
          DATABASE_NAME: marketx_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          PORT: 3000
          JWT_SECRET: test-secret-key-for-pact-testing
          PACT_TEST_AUTH_TOKEN: test-auth-token
        run: |
          npm run start:prod &
          echo $! > .app.pid
          # Wait for app to be ready
          timeout 60 bash -c 'until curl -f http://localhost:3000/health 2>/dev/null; do sleep 2; done'

      - name: Verify Pact Contracts (Local Files)
        env:
          PROVIDER_BASE_URL: http://localhost:3000
          GIT_COMMIT: ${{ github.sha }}
          GIT_BRANCH: ${{ github.ref_name }}
          PACT_BROKER_URL: ${{ secrets.PACT_BROKER_URL }}
          PACT_BROKER_TOKEN: ${{ secrets.PACT_BROKER_TOKEN }}
          PACT_TEST_AUTH_TOKEN: test-auth-token
        run: npm run pact:verify
        continue-on-error: false

      - name: Stop application
        if: always()
        run: |
          if [ -f .app.pid ]; then
            kill $(cat .app.pid) || true
            rm .app.pid
          fi

      - name: Upload Pact verification results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pact-verification-results
          path: pact/logs/
          retention-days: 30

      - name: Comment PR with results
        if: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: ' **Pact Contract Verification Failed**\n\nYour changes break existing consumer contracts. Please review the verification logs and ensure backward compatibility.\n\n[View Logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})'
            })

  can-i-deploy:
    name: Can I Deploy Check
    runs-on: ubuntu-latest
    needs: verify-contracts
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Pact CLI
        run: npm install -g @pact-foundation/pact-node

      - name: Can I Deploy?
        env:
          PACT_BROKER_URL: ${{ secrets.PACT_BROKER_URL }}
          PACT_BROKER_TOKEN: ${{ secrets.PACT_BROKER_TOKEN }}
        run: |
          if [ -n "$PACT_BROKER_URL" ]; then
            npx pact-broker can-i-deploy \
              --pacticipant MarketX-Backend \
              --version ${{ github.sha }} \
              --to-environment production \
              --broker-base-url $PACT_BROKER_URL \
              --broker-token $PACT_BROKER_TOKEN
          else
            echo "Pact Broker not configured, skipping can-i-deploy check"
          fi
